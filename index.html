<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agenda Profissional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">

<style>
body { margin:0; font-family:Arial; background:linear-gradient(135deg,#4f46e5,#06b6d4); color:white; }
#login { display:flex; height:100vh; justify-content:center; align-items:center; }
.login-box { background:rgba(0,0,0,0.4); padding:30px; border-radius:15px; text-align:center; }
.login-box input { margin:10px 0; padding:10px; width:200px; border-radius:8px; border:none; }
.login-box button { padding:10px; width:100%; border-radius:8px; border:none; background:#22c55e; color:white; }

#app { display:none; padding:15px; }
.topo { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:20px; }

button { padding:8px; border-radius:10px; border:none; cursor:pointer; }

.dia { background:rgba(255,255,255,0.1); padding:15px; margin:15px 0; border-radius:15px; }
.equipe { margin:10px 0; padding:10px; border-radius:10px; background:rgba(0,0,0,0.2); }

.servico { display:flex; gap:5px; margin:5px 0; flex-wrap:wrap; }

input, select { padding:6px; border-radius:8px; border:none; }

.pendente { background:#ef4444; }
.andamento { background:#fde68a; color:black; }
.concluido { background:#22c55e; }
</style>
</head>

<body>

<div id="login">
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button id="btnLogin">Entrar</button>
  </div>
</div>

<div id="app">
<h1>Agenda de Equipes</h1>

<div class="topo">
  <input type="month" id="mesSelecionado">
  <button onclick="salvarTudo()">💾 Salvar</button>
  <button onclick="relatorioEquipes()">📊 Equipes</button>
  <button onclick="relatorioMedicoes()">📋 Medições</button>
  <button onclick="relatorioVendedores()">🧑‍💼 Vendedores</button>
  <button onclick="limparTudo()">🗑️ Limpar</button>
</div>

<div id="agenda"></div>
</div>

<script>

// LOGIN
btnLogin.onclick = () => {
  let u = user.value.trim().toLowerCase();
  let p = pass.value.trim();

  if(u==="1") u="administrador";

  if(u==="administrador" && p==="0502"){
    login.style.display="none";
    app.style.display="block";
  } else {
    alert("Login inválido");
  }
};

pass.addEventListener("keypress",e=>{
  if(e.key==="Enter") btnLogin.click();
});

// DADOS
let nomes=["Rodrigo","Jocimar","Maicon","Roberto","Robson","João","Ricardo","Equipe 8"];
let vendedores=["Dyego","Edenilson","Deivid"];

// DATA
function formatarData(d){
  let dia=String(d.getDate()).padStart(2,'0');
  let m=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
  return `${dia} de ${m[d.getMonth()]} de ${d.getFullYear()}`;
}

// COR
function aplicarCor(el,s){
  el.classList.remove("pendente","andamento","concluido");
  if(s==="Pendente") el.classList.add("pendente");
  if(s==="Em andamento") el.classList.add("andamento");
  if(s==="Concluído") el.classList.add("concluido");
}

// ADD SERVIÇO
function adicionarServico(container){
  let box=document.createElement("div");
  box.className="servico";

  let input=document.createElement("input");

  let status=document.createElement("select");
  ["Pendente","Em andamento","Concluído"].forEach(s=>{
    let o=document.createElement("option");
    o.value=s;
    o.textContent=s;
    status.appendChild(o);
  });

  let check=document.createElement("input");
  check.type="checkbox";

  let vendedor=document.createElement("select");
  vendedores.forEach(v=>{
    let o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    vendedor.appendChild(o);
  });

  let del=document.createElement("button");
  del.textContent="X";
  del.onclick=()=>box.remove();

  status.onchange=()=>aplicarCor(box,status.value);

  box.append(input,status,check,vendedor,del);
  container.appendChild(box);
}

// GERAR AGENDA
function gerarAgenda(){
  agenda.innerHTML="";
  let [ano,mes]=mesSelecionado.value.split("-");
  let data=new Date(ano,mes-1,1);

  while(data.getMonth()==(mes-1)){
    if(data.getDay()>=1 && data.getDay()<=5){

      let dia=document.createElement("div");
      dia.className="dia";
      dia.innerHTML=`<strong>${formatarData(data)}</strong>`;

      nomes.forEach(nome=>{
        let eq=document.createElement("div");
        eq.className="equipe";

        let titulo=document.createElement("div");
        titulo.textContent=nome;

        let container=document.createElement("div");

        let btn=document.createElement("button");
        btn.textContent="+";
        btn.onclick=()=>adicionarServico(container);

        eq.append(titulo,container,btn);
        dia.appendChild(eq);
      });

      agenda.appendChild(dia);
    }
    data.setDate(data.getDate()+1);
  }
}

// SALVAR
function salvarTudo(){
  let dados=[];

  document.querySelectorAll(".dia").forEach(dia=>{
    let data=dia.querySelector("strong").textContent;

    dia.querySelectorAll(".equipe").forEach(eq=>{
      let nome=eq.children[0].textContent;

      eq.querySelectorAll(".servico").forEach(s=>{
        let texto=s.children[0].value;
        if(!texto) return;

        dados.push({
          data,
          equipe:nome,
          texto,
          status:s.children[1].value,
          medicao:s.children[2].checked,
          vendedor:s.children[3].value
        });
      });
    });
  });

  localStorage.setItem("agenda", JSON.stringify(dados));
  alert("✅ Salvo com sucesso!");
}

// RELATÓRIOS
function relatorioEquipes(){
  let dados = JSON.parse(localStorage.getItem("agenda")) || {};
  let cont = {};

  dados.forEach(d=>{
    cont[d.equipe]=(cont[d.equipe]||0)+1;
  });

  let txt="RELATÓRIO EQUIPES\n\n";
  for(let k in cont) txt+=k+": "+cont[k]+" serviços\n";

  alert(txt);
}

function relatorioMedicoes(){
  let dados = JSON.parse(localStorage.getItem("agenda")) || [];
  let total = dados.filter(d=>d.medicao).length;
  alert("Total de medições: "+total);
}

function relatorioVendedores(){
  let dados = JSON.parse(localStorage.getItem("agenda")) || [];
  let cont = {};

  dados.forEach(d=>{
    cont[d.vendedor]=(cont[d.vendedor]||0)+1;
  });

  let txt="RELATÓRIO VENDEDORES\n\n";
  for(let k in cont) txt+=k+": "+cont[k]+" serviços\n";

  alert(txt);
}

// CARREGAR
function carregarDados(){
  let dados = JSON.parse(localStorage.getItem("agenda")) || [];

  dados.forEach(item=>{
    document.querySelectorAll(".dia").forEach(dia=>{
      let dataTela = dia.querySelector("strong").textContent;

      if(dataTela === item.data){
        dia.querySelectorAll(".equipe").forEach(eq=>{
          let nome = eq.children[0].textContent;

          if(nome === item.equipe){
            let container = eq.children[1];

            let box=document.createElement("div");
            box.className="servico";

            let input=document.createElement("input");
            input.value=item.texto;

            let status=document.createElement("select");
            ["Pendente","Em andamento","Concluído"].forEach(s=>{
              let o=document.createElement("option");
              o.value=s;
              o.textContent=s;
              if(s===item.status) o.selected=true;
              status.appendChild(o);
            });

            let check=document.createElement("input");
            check.type="checkbox";
            check.checked=item.medicao;

            let vendedor=document.createElement("select");
            vendedores.forEach(v=>{
              let o=document.createElement("option");
              o.value=v;
              o.textContent=v;
              if(v===item.vendedor) o.selected=true;
              vendedor.appendChild(o);
            });

            let del=document.createElement("button");
            del.textContent="X";
            del.onclick=()=>box.remove();

            status.onchange=()=>aplicarCor(box,status.value);
            aplicarCor(box,item.status);

            box.append(input,status,check,vendedor,del);
            container.appendChild(box);
          }
        });
      }
    });
  });
}

// LIMPAR
function limparTudo(){
  if(confirm("Apagar tudo?")){
    localStorage.removeItem("agenda");
    location.reload();
  }
}

// INICIO
let hoje=new Date();
mesSelecionado.value=hoje.getFullYear()+"-"+String(hoje.getMonth()+1).padStart(2,'0');

mesSelecionado.onchange=()=>{
  gerarAgenda();
  carregarDados();
};

gerarAgenda();
carregarDados();

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
